<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodisla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/diseñoMain.css?v=1.3">
</head>
<body>
    <header>
        <div class="header-left">
            <a href="#" class="logo">
                <span>Rodisla</span>
            </a>
            <a href="#" class="nav-link">Rodamientos</a>
        </div>

        <div class="header-right">
            <button class="cart-button" type="button">
                <span>🛒</span>
                <span>Carrito</span>
                <span class="cart-badge">0</span>
            </button>
            <a href="./login.html" class="login-link">Iniciar Sesión</a>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li class="nav-menu-item active">
                        <a href="#" class="nav-menu-link">
                            <span class="nav-menu-icon">📦</span>
                            <span>Catálogo</span>
                        </a>
                    </li>
                    <li class="nav-menu-item">
                        <a href="#" class="nav-menu-link">
                            <span class="nav-menu-icon">🧾</span>
                            <span>Mis Pedidos</span>
                        </a>
                    </li>
                    <li class="nav-menu-item">
                        <a href="#" class="nav-menu-link">
                            <span class="nav-menu-icon">📄</span>
                            <span>Facturas</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="catalog-top-bar">
                <form class="search-form" action="#" method="get">
                    <input class="search-input" type="search" name="q" placeholder="Buscar productos por nombre o referencia..." />
                    <button class="search-button" type="submit">Buscar</button>
                </form>
            </div>

            <div class="catalog-filters">
                <div class="filter-group">
                    <label class="filter-label" for="category-select">Categoría</label>
                    <select id="category-select" class="filter-select">
                        <option value="">Todas</option>
                        <option value="Rodamientos">Rodamientos</option>
                        <option value="Automotriz">Automotriz</option>
                        <option value="Industrial">Industrial</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="brand-select">Marca</label>
                    <select id="brand-select" class="filter-select">
                        <option value="">Todas las marcas</option>
                        <option value="SKF">SKF</option>
                        <option value="NSK">NSK</option>
                        <option value="NTN">NTN</option>
                        <option value="FAG">FAG</option>
                        <option value="KOYO">KOYO</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="price-min">Precio mínimo</label>
                    <input id="price-min" class="filter-input" type="number" min="0" placeholder="$0" />
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="price-max">Precio máximo</label>
                    <input id="price-max" class="filter-input" type="number" min="0" placeholder="$1000" />
                </div>

                <button class="filter-apply-btn" type="button" id="apply-filters">Aplicar filtros</button>
            </div>

            <div class="catalog-header">
                <div>
                    <p class="breadcrumb">Catalogo / Rodamientos</p>
                    <h1 class="main-title">Catalogo de Rodamientos</h1>
                </div>
                <div class="catalog-actions">
                    <span class="catalog-show">Mostrando: <strong id="result-count">0</strong> productos</span>
                </div>
            </div>

            <div class="catalog-grid"></div>

            <nav class="catalog-pagination"></nav>
        </main>
    </div>
    <script src="js/rodamientos.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/sesion.js"></script>
</body>
</html>
