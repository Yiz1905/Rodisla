<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Rodisla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/diseñoLogin.css">
</head>
<body>
    <main class="login-card">
        <a class="close-login" href="index.html" aria-label="Cerrar registro">x</a>
        <div class="login-brand">
            <img src="Imagenes/rodislaLogo.jpeg" alt="Logo Rodisla" />
            <div>
                <h1 class="login-title">Crear Cuenta</h1>
                <p class="login-subtitle">Regístrate para acceder al catálogo de Rodamientos</p>
            </div>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label class="field-label" for="nombre">Nombre completo</label>
                <div class="input-wrapper" data-icon="👤">
                    <input class="input-field" type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>
            </div>

            <div class="form-group">
                <label class="field-label" for="email">Email</label>
                <div class="input-wrapper" data-icon="📧">
                    <input class="input-field" type="email" id="email" name="email" placeholder="ejemplo@rodisla.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="field-label" for="telefono">Teléfono</label>
                <div class="input-wrapper" data-icon="📱">
                    <input class="input-field" type="tel" id="telefono" name="telefono" placeholder="+54 11 1234-5678" required>
                </div>
            </div>

            <div class="form-group">
                <label class="field-label" for="password">Contraseña</label>
                <div class="input-wrapper" data-icon="🔒">
                    <input class="input-field" type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
            </div>

            <div class="form-group">
                <label class="field-label" for="confirm-password">Confirmar contraseña</label>
                <div class="input-wrapper" data-icon="🔒">
                    <input class="input-field" type="password" id="confirm-password" name="confirm-password" placeholder="Repite tu contraseña" required minlength="6">
                </div>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" name="terms" required>
                Acepto los términos y condiciones
            </label>

            <button class="login-button" type="submit">REGISTRARSE →</button>
        </form>

        <div class="login-footer">
            <p class="register-text">¿Ya tienes una cuenta?</p>
            <a href="login.html" class="register-button">VOLVER AL LOGIN</a>
        </div>
    </main>
    <script src="js/registro.js"></script>
</body>
</html>
